name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deployments; let each in-progress deploy finish (force-push safe).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Enables Pages in "GitHub Actions" source mode via the API (uses the
      # workflow's pages: write token), so no manual Settings toggle is needed.
      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      # Upload the whole static site as-is (auto-excludes .git and .github).
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
